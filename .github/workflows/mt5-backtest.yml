 name: MT5 Free Cloud Backtest - XAUUSD V17

on:

workflow_dispatch:

inputs:

symbol:

description: "Broker symbol: XAUUSD, XAUUSDm, GOLD, XAUUSD.pro, etc."

required: true

default: "XAUUSD"

period:

description: "MT5 timeframe: M15 recommended"

required: true

default: "M15"

from_date:

description: "Backtest start date YYYY.MM.DD"

required: true

default: "2025.01.01"

to_date:

description: "Backtest end date YYYY.MM.DD"

required: true

default: "2025.01.15"

deposit:

description: "Initial deposit"

required: true

default: "10000"

leverage:

description: "Leverage"

required: true

default: "1:100"

model:

description: "0=Every tick, 4=Every tick based on real ticks"

required: true

default: "0"

sync_minutes:

description: "Minutes to keep MT5 open before the test so broker history can sync"

required: true

default: "15"

timeout_minutes:

description: "Stop job after N minutes; GitHub-hosted max is 360"

required: true

default: "330"

jobs:

mt5-backtest:

runs-on: windows-latest

timeout-minutes: 360

env:

BT_SYMBOL: ${{ github.event.inputs.symbol }}

BT_PERIOD: ${{ github.event.inputs.period }}

BT_FROM_DATE: ${{ github.event.inputs.from_date }}

BT_TO_DATE: ${{ github.event.inputs.to_date }}

BT_DEPOSIT: ${{ github.event.inputs.deposit }}

BT_LEVERAGE: ${{ github.event.inputs.leverage }}

BT_MODEL: ${{ github.event.inputs.model }}

BT_SYNC_MINUTES: ${{ github.event.inputs.sync_minutes }}

BT_TIMEOUT_MINUTES: ${{ github.event.inputs.timeout_minutes }}

MT5_LOGIN: ${{ secrets.MT5_LOGIN }}

MT5_PASSWORD: ${{ secrets.MT5_PASSWORD }}

MT5_SERVER: ${{ secrets.MT5_SERVER }}

steps:

- name: Checkout repository

uses: actions/checkout@v4

- name: Run MT5 Strategy Tester

shell: pwsh

run: ./scripts/run-mt5-backtest.ps1

- name: Upload MT5 reports and logs

if: always()

uses: actions/upload-artifact@v4

with:

name: mt5-v17-backtest-report

path: |

reports/**

mt5_portable/reports/**

mt5_portable/MQL5/Logs/**

mt5_portable/Logs/**

if-no-files-found: warn

retention-days: 14
