name: MT5 XAU Public Backtest

on:
  workflow_dispatch:
    inputs:
      symbol:
        description: "Custom symbol used by the public-history runner"
        required: true
        default: "XAU_PUBLIC"
        type: string
      period:
        description: "MT5 timeframe"
        required: true
        default: "M15"
        type: string
      from_date:
        description: "Backtest start date YYYY.MM.DD"
        required: true
        default: "2026.06.01"
        type: string
      to_date:
        description: "Backtest end date YYYY.MM.DD"
        required: true
        default: "2026.06.20"
        type: string
      deposit:
        description: "Initial deposit"
        required: true
        default: "10000"
        type: string
      leverage:
        description: "Leverage"
        required: true
        default: "1:100"
        type: string
      model:
        description: "0=Every tick, 4=Every tick based on real ticks"
        required: true
        default: "0"
        type: string
      sync_minutes:
        description: "Compatibility input"
        required: true
        default: "15"
        type: string
      timeout_minutes:
        description: "Total timeout in minutes"
        required: true
        default: "180"
        type: string

permissions:
  contents: read
  actions: read

jobs:
  mt5-backtest:
    name: Run MT5 public XAU backtest
    runs-on: windows-latest
    timeout-minutes: 360

    env:
      BT_SYMBOL: ${{ inputs.symbol }}
      BT_PERIOD: ${{ inputs.period }}
      BT_FROM_DATE: ${{ inputs.from_date }}
      BT_TO_DATE: ${{ inputs.to_date }}
      BT_DEPOSIT: ${{ inputs.deposit }}
      BT_LEVERAGE: ${{ inputs.leverage }}
      BT_MODEL: ${{ inputs.model }}
      BT_SYNC_MINUTES: ${{ inputs.sync_minutes }}
      BT_TIMEOUT_MINUTES: ${{ inputs.timeout_minutes }}
      MT5_LOGIN: ${{ secrets.MT5_LOGIN }}
      MT5_PASSWORD: ${{ secrets.MT5_PASSWORD }}
      MT5_SERVER: ${{ secrets.MT5_SERVER }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run public XAU history backtest
        shell: pwsh
        run: ./scripts/run-public-history-backtest.ps1

      - name: Upload MT5 reports and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mt5-v17-backtest-report
          path: reports/**
          if-no-files-found: warn
          retention-days: 14
