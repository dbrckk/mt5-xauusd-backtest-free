name: CURRENT PUBLIC XAU ONLY

on:
  workflow_dispatch:
    inputs:
      period:
        description: "MT5 timeframe"
        required: true
        default: "M15"
        type: string
      from_date:
        description: "Backtest start date YYYY.MM.DD"
        required: true
        default: "2026.06.01"
        type: string
      to_date:
        description: "Backtest end date YYYY.MM.DD"
        required: true
        default: "2026.06.20"
        type: string
      deposit:
        description: "Initial deposit"
        required: true
        default: "10000"
        type: string
      leverage:
        description: "Leverage"
        required: true
        default: "1:100"
        type: string
      model:
        description: "0=Every tick"
        required: true
        default: "0"
        type: string
      timeout_minutes:
        description: "Timeout minutes"
        required: true
        default: "180"
        type: string

permissions:
  contents: read

jobs:
  current-public-xau:
    runs-on: windows-latest
    timeout-minutes: 360
    env:
      BT_SYMBOL: XAU_PUBLIC
      BT_PERIOD: ${{ inputs.period }}
      BT_FROM_DATE: ${{ inputs.from_date }}
      BT_TO_DATE: ${{ inputs.to_date }}
      BT_DEPOSIT: ${{ inputs.deposit }}
      BT_LEVERAGE: ${{ inputs.leverage }}
      BT_MODEL: ${{ inputs.model }}
      BT_TIMEOUT_MINUTES: ${{ inputs.timeout_minutes }}
      MT5_LOGIN: ${{ secrets.MT5_LOGIN }}
      MT5_PASSWORD: ${{ secrets.MT5_PASSWORD }}
      MT5_SERVER: ${{ secrets.MT5_SERVER }}
    steps:
      - uses: actions/checkout@v4

      - name: Clean report folder
        shell: pwsh
        run: |
          if (Test-Path reports) { Remove-Item reports -Recurse -Force }
          New-Item -ItemType Directory -Force -Path reports | Out-Null
          Set-Content -Path reports/CURRENT_PUBLIC_XAU_ONLY.txt -Value "CURRENT_PUBLIC_XAU_ONLY"
          Add-Content -Path reports/CURRENT_PUBLIC_XAU_ONLY.txt -Value "workflow=current-public-xau-only.yml"
          Add-Content -Path reports/CURRENT_PUBLIC_XAU_ONLY.txt -Value "run_number=${{ github.run_number }}"
          Add-Content -Path reports/CURRENT_PUBLIC_XAU_ONLY.txt -Value "sha=${{ github.sha }}"
          Get-ChildItem .github/workflows -File | Select-Object Name,Length | Format-Table -AutoSize | Out-String | Set-Content -Path reports/WORKFLOWS_PRESENT.txt -Encoding UTF8

      - name: Force public entry diagnostics
        shell: pwsh
        run: |
          $p = "scripts/run-public-history-backtest.ps1"
          $txt = Get-Content -Path $p -Raw
          $txt = $txt.Replace('input double InpMinScoreToEnter = 20.0;', 'input double InpMinScoreToEnter = 0.0;')
          $txt = $txt.Replace('input double InpMinScoreGap = 0.0;', 'input double InpMinScoreGap = -1.0;')
          $txt = $txt.Replace('input double InpV14MinEntryScore = 20.0;', 'input double InpV14MinEntryScore = 0.0;')
          $txt = $txt.Replace('input double InpV14MinEntryGap = 0.0;', 'input double InpV14MinEntryGap = -1.0;')
          $txt = $txt.Replace('"InpMinScoreToEnter=20.0"', '"InpMinScoreToEnter=0.0"')
          $txt = $txt.Replace('"InpMinScoreGap=0.0"', '"InpMinScoreGap=-1.0"')
          $txt = $txt.Replace('"InpV14MinEntryScore=20.0"', '"InpV14MinEntryScore=0.0"')
          $txt = $txt.Replace('"InpV14MinEntryGap=0.0"', '"InpV14MinEntryGap=-1.0"')
          $txt = $txt.Replace('"InpMaxNewEntriesPerDay=80"', '"InpMaxNewEntriesPerDay=500"')
          Set-Content -Path $p -Value $txt -Encoding UTF8
          Add-Content -Path reports/CURRENT_PUBLIC_XAU_ONLY.txt -Value "force_entry_diagnostics=true"

      - name: Patch XAU_PUBLIC base-filter and zero-signal fallback
        shell: pwsh
        run: |
          $ea = "MQL5/Experts/QuantumQueenStyle_XAU_Grid_PRO_V17_10K_PROFITASYMMETRY.mq5"
          $txt = Get-Content -Path $ea -Raw
          $before = $txt
          $txt = $txt.Replace('if(!BaseFiltersOK(sig)) return;', 'if(!BaseFiltersOK(sig)) { if(!(_Symbol == "XAU_PUBLIC" || InpTradeSymbol == "XAU_PUBLIC")) return; g_status = "PUBLIC_DIAG_FILTER_BYPASS"; DecisionLog(g_status); }')
          $old = @'
if(sig.direction == 0)

{

g_status = "NO_SIGNAL";

DecisionLog(g_status + " buy=" + DoubleToString(sig.buyScore, 1) + " sell=" + DoubleToString(sig.sellScore, 1));

return;

}
'@
          $new = @'
if(sig.direction == 0)

{

if(_Symbol == "XAU_PUBLIC" || InpTradeSymbol == "XAU_PUBLIC")

{

sig.direction = (sig.buyScore >= sig.sellScore ? 1 : -1);

sig.buyScore = (sig.direction == 1 ? 100.0 : sig.buyScore);

sig.sellScore = (sig.direction == -1 ? 100.0 : sig.sellScore);

sig.scoreGap = 100.0;

g_status = "PUBLIC_DIAG_FORCED_SIGNAL";

DecisionLog(g_status + " dir=" + IntegerToString(sig.direction));

}

else

{

g_status = "NO_SIGNAL";

DecisionLog(g_status + " buy=" + DoubleToString(sig.buyScore, 1) + " sell=" + DoubleToString(sig.sellScore, 1));

return;

}

}
'@
          if (-not $txt.Contains($old)) { throw "OnTick zero-signal block not found" }
          $txt = $txt.Replace($old, $new)
          if ($txt -eq $before) { throw "XAU_PUBLIC patch changed nothing" }
          if ($txt -notmatch "PUBLIC_DIAG_FILTER_BYPASS") { throw "Base-filter bypass patch missing" }
          if ($txt -notmatch "PUBLIC_DIAG_FORCED_SIGNAL") { throw "Forced signal patch missing" }
          Set-Content -Path $ea -Value $txt -Encoding UTF8
          Add-Content -Path reports/CURRENT_PUBLIC_XAU_ONLY.txt -Value "public_filter_and_zero_signal_fallback=patched"

      - name: Run current public XAU backtest
        shell: pwsh
        run: ./scripts/run-public-history-backtest.ps1

      - name: Reject legacy pipeline artifacts
        if: always()
        shell: pwsh
        run: |
          $legacy = @("reports/prefetch_history.log", "reports/QQ_MT5_PreLogin_GHA.ini", "reports/QQ_MT5_Backtest_GHA.ini")
          foreach ($f in $legacy) {
            if (Test-Path $f) { throw "Legacy artifact file detected: $f" }
          }
          Add-Content -Path reports/CURRENT_PUBLIC_XAU_ONLY.txt -Value "legacy_artifact_check=passed"

      - name: Upload current public XAU artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: CURRENT-PUBLIC-XAU-ONLY
          path: reports/**
          if-no-files-found: error
          retention-days: 14
